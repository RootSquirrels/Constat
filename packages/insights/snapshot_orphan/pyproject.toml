[project]
name = "constat-snapshot-orphan"
version = "0.0.0"
description = "Insight: orphaned EBS snapshots (source volume deleted, still billed)"
requires-python = ">=3.13"
dependencies = [
    "constat-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/constat_snapshot_orphan"]
