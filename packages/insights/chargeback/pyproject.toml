[project]
name = "constat-chargeback"
version = "0.0.0"
description = "Insight: per-account × service cost chargeback (amortized vs brut)"
requires-python = ">=3.13"
dependencies = [
    "constat-core",
    "constat-focus",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/constat_chargeback"]
