[project]
name = "constat-ec2-stopped-with-storage"
version = "0.0.0"
description = "Insight: stopped EC2 instances still paying for attached EBS storage"
requires-python = ">=3.13"
dependencies = [
    "constat-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/constat_ec2_stopped_with_storage"]
