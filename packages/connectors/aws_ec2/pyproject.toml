[project]
name = "constat-aws-ec2"
version = "0.0.0"
description = "AWS EC2/EBS connector — boto3 DescribeInstances/Volumes/Snapshots"
requires-python = ">=3.13"
dependencies = [
    "constat-core",
    "boto3>=1.34",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/constat_aws_ec2"]
