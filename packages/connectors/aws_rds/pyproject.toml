[project]
name = "constat-aws-rds"
version = "0.0.0"
description = "AWS RDS connector — boto3 DescribeDBInstances"
requires-python = ">=3.13"
dependencies = [
    "constat-core",
    "boto3>=1.34",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/constat_aws_rds"]
