# Fact definitions registry (V1 — test-time only).
#
# Every fact published to the `facts` table by a connector, and every
# fact read by an insight, must have an entry here. A pytest test
# (tests/test_fact_definitions.py) cross-checks the producer code, the
# consumer code, and this file. CI fails if any side drifts.
#
# Why a registry at all (vs the V2 FactDefinitionRegistry the strategic
# doc mentions): a YAML + test catches the 80% of bugs that matter
# (typos in namespace.key, missing entries, producer/consumer drift)
# with 5% of the maintenance cost. When V2's runtime registry lands,
# this YAML is the input for the migration — no data migration, just
# promotion of the schema.
#
# Adding a fact (3 steps, all required):
#   1. Add the entry here.
#   2. Update EXPECTED_PRODUCED or EXPECTED_CONSUMED in the test.
#   3. Bump `last_reviewed` to today's date and put it in the PR title.
#
# When AWS publishes changes (new engine, new instance class), this
# file is the place to start. The catalog of EOL dates and vCPU
# (`catalog/aws.py`) is separate — that data is reference, not Fact.
#
# Schema per entry:
#   namespace, key           — the namespaced key
#   value_type               — string | integer | decimal | boolean | date | json
#   description              — one-line purpose
#   allowed_values           — list of accepted values (optional, for enums)
#   pattern                  — regex the string value must match (optional)
#   minimum / maximum        — bounds for numeric values (optional)
#   producer                 — connector module that publishes this fact
#   consumers                — list of insight rules that read it
#   since                    — date this entry was added (audit trail)

schema_version: 1
last_reviewed: "2026-07-19"

facts:
  - namespace: aws.rds
    key: engine
    value_type: string
    description: |
      RDS engine family. UNKNOWN when the API call succeeded but
      `Engine` was empty or missing. V1 insight rules only act on
      "postgres"; anything else is a NO_MATCH.
    allowed_values:
      - aurora-mysql
      - aurora-postgresql
      - mariadb
      - mysql
      - oracle-ee
      - oracle-se
      - oracle-se1
      - oracle-se2
      - postgres
      - sqlserver-ee
      - sqlserver-ex
      - sqlserver-se
      - sqlserver-web
    producer: aws_rds
    consumers:
      - rds_eol
      - mysql_eol
      - aurora_eol
    since: "2026-07-18"

  - namespace: aws.rds
    key: engine_version
    value_type: string
    description: |
      RDS engine version, e.g. "14.7". V1 parses the major component
      for the EOL lookup. Malformed strings produce INCONCLUSIVE with
      `reason = "aws.rds.engine_version.malformed"`.
    pattern: "^[0-9]+(\\.[0-9]+){0,2}$"
    producer: aws_rds
    consumers:
      - rds_eol
      - mysql_eol
      - aurora_eol
    since: "2026-07-18"

  - namespace: aws.rds
    key: instance_class
    value_type: string
    description: |
      RDS instance class, e.g. "db.m5.xlarge". UNKNOWN when missing
      from the API or not in the catalog. Not consumed by any V1
      insight (kept for vCPU derivation and future use).
    pattern: "^db\\.[a-z0-9]+\\.[a-z0-9]+$"
    producer: aws_rds
    consumers: []  # collected for archive; no V1 consumer
    since: "2026-07-18"

  - namespace: aws.rds
    key: vcpu
    value_type: integer
    description: |
      vCPU count for the instance class, looked up from the catalog
      (`catalog.aws.RDS_INSTANCE_VCPU`). UNKNOWN when the class is
      not in the catalog (e.g. a new Graviton class AWS published
      and we haven't mirrored yet).
    minimum: 0
    maximum: 1024
    producer: aws_rds
    consumers:
      - rds_eol
      - mysql_eol
      - aurora_eol
    since: "2026-07-18"

  - namespace: aws.rds
    key: region
    value_type: string
    description: |
      AWS region of the DB instance (collector-injected `_region`).
      RDS Extended Support pricing is not region-uniform, so the three
      EOL rules gate on this fact: missing/UNKNOWN = INCONCLUSIVE,
      never a silently mis-gridded amount. A region the catalog doesn't
      cover falls back to the us-east-1 grid with
      price_region_exact=false.
    pattern: "^[a-z]{2}(-[a-z]+)+-[0-9]+$"
    producer: aws_rds
    consumers:
      - rds_eol
      - mysql_eol
      - aurora_eol
    since: "2026-07-19"

  # ------------------------------------------------------------------
  # aws.ec2.volume.* — produced by the aws_ec2 connector
  # (packages/connectors/aws_ec2, volume_to_facts).
  # ------------------------------------------------------------------

  - namespace: aws.ec2.volume
    key: size_gb
    value_type: integer
    description: |
      Provisioned volume size in GiB. UNKNOWN when DescribeVolumes
      omits `Size`. Cost input for every EBS rule.
    minimum: 1
    producer: aws_ec2
    consumers:
      - ebs_unattached
      - ebs_gp2_to_gp3
    since: "2026-07-18"

  - namespace: aws.ec2.volume
    key: volume_type
    value_type: string
    description: |
      EBS volume type. An uncatalogued type (a future io3) yields
      INCONCLUSIVE in the rules, never a $0 insight.
    allowed_values:
      - gp2
      - gp3
      - io1
      - io2
      - st1
      - sc1
      - standard
    producer: aws_ec2
    consumers:
      - ebs_unattached
      - ebs_gp2_to_gp3
    since: "2026-07-18"

  - namespace: aws.ec2.volume
    key: state
    value_type: string
    description: |
      Volume lifecycle state. `available` = attached to nothing —
      the ebs_unattached trigger.
    allowed_values:
      - available
      - in-use
      - creating
      - deleting
      - deleted
      - error
    producer: aws_ec2
    consumers:
      - ebs_unattached
    since: "2026-07-18"

  - namespace: aws.ec2.volume
    key: encrypted
    value_type: boolean
    description: |
      Encryption-at-rest flag. Collected for the future security
      angle; no V1 consumer.
    producer: aws_ec2
    consumers: []
    since: "2026-07-18"

  - namespace: aws.ec2.volume
    key: iops
    value_type: integer
    description: |
      Provisioned IOPS (io1/io2/gp3). The IOPS cost component is
      deliberately NOT priced in V1 (workload-dependent).
    minimum: 0
    producer: aws_ec2
    consumers: []
    since: "2026-07-18"

  - namespace: aws.ec2.volume
    key: throughput
    value_type: integer
    description: Provisioned throughput in MiB/s (gp3/st1). Archive only in V1.
    minimum: 0
    producer: aws_ec2
    consumers: []
    since: "2026-07-18"

  - namespace: aws.ec2.volume
    key: attached_instance_id
    value_type: string
    description: |
      Instance the volume is attached to (first attachment), e.g.
      "i-0abc123". UNKNOWN when unattached.
    producer: aws_ec2
    consumers: []
    since: "2026-07-18"

  - namespace: aws.ec2.volume
    key: attached_device
    value_type: string
    description: Device name of the first attachment, e.g. "/dev/xvda". Archive only.
    producer: aws_ec2
    consumers: []
    since: "2026-07-18"

  - namespace: aws.ec2.volume
    key: create_time
    value_type: date
    description: Volume creation timestamp (ISO). Archive only in V1.
    producer: aws_ec2
    consumers: []
    since: "2026-07-18"

  - namespace: aws.ec2.volume
    key: region
    value_type: string
    description: |
      AWS region of the volume (collector-injected `_region`). EBS
      pricing is not region-uniform, so the pricing rules gate on this
      fact: missing/UNKNOWN region = INCONCLUSIVE, never a silently
      mis-gridded amount. A region the catalog doesn't cover falls
      back to the us-east-1 grid with price_region_exact=false.
    pattern: "^[a-z]{2}(-[a-z]+)+-[0-9]+$"
    producer: aws_ec2
    consumers:
      - ebs_unattached
      - ebs_gp2_to_gp3
    since: "2026-07-19"

  # ------------------------------------------------------------------
  # aws.ec2.snapshot.* — snapshot_to_facts + the correlation post-pass
  # (volume_exists spans two jobs' scans; written per region after
  # all jobs succeed).
  # ------------------------------------------------------------------

  - namespace: aws.ec2.snapshot
    key: state
    value_type: string
    description: |
      Snapshot lifecycle state. Only `completed` snapshots are
      billable evidence for snapshot_orphan.
    allowed_values:
      - pending
      - completed
      - error
      - recoverable
    producer: aws_ec2
    consumers:
      - snapshot_orphan
    since: "2026-07-18"

  - namespace: aws.ec2.snapshot
    key: size_gb
    value_type: integer
    description: Source volume size in GiB (snapshots bill per stored GB).
    minimum: 1
    producer: aws_ec2
    consumers:
      - snapshot_orphan
    since: "2026-07-18"

  - namespace: aws.ec2.snapshot
    key: storage_tier
    value_type: string
    description: |
      Snapshot storage tier. Absent in older API responses — the
      rule defaults to `standard` pricing and says so.
    allowed_values:
      - standard
      - archive
    producer: aws_ec2
    consumers:
      - snapshot_orphan
    since: "2026-07-18"

  - namespace: aws.ec2.snapshot
    key: volume_id
    value_type: string
    description: Source volume id, e.g. "vol-0abc123". Input of the correlation post-pass.
    producer: aws_ec2
    consumers: []
    since: "2026-07-18"

  - namespace: aws.ec2.snapshot
    key: start_time
    value_type: date
    description: Snapshot creation timestamp (ISO). Drives snapshot_age_days in the insight.
    producer: aws_ec2
    consumers:
      - snapshot_orphan
    since: "2026-07-18"

  - namespace: aws.ec2.snapshot
    key: description
    value_type: string
    description: |
      Free-text description. AWS writes "ami-..." into AMI-owned
      snapshots' descriptions; snapshot_orphan treats any ami-
      reference as NO_MATCH (conservative — DescribeImages
      corroboration is V2). KNOWN with empty string is meaningful
      (manual snapshot, no description).
    producer: aws_ec2
    consumers:
      - snapshot_orphan
    since: "2026-07-18"

  - namespace: aws.ec2.snapshot
    key: volume_exists
    value_type: boolean
    description: |
      Correlation fact written by the collector's per-region
      post-pass: True when the source volume appeared in THIS
      region's volume scan. ABSENT (not False) when the volume job
      failed or didn't run — absence of proof, so the rule goes
      INCONCLUSIVE instead of guessing.
    producer: aws_ec2
    consumers:
      - snapshot_orphan
    since: "2026-07-18"

  - namespace: aws.ec2.snapshot
    key: region
    value_type: string
    description: |
      AWS region of the snapshot (collector-injected `_region`).
      Snapshot pricing is not region-uniform; snapshot_orphan gates on
      this fact (missing/UNKNOWN = INCONCLUSIVE).
    pattern: "^[a-z]{2}(-[a-z]+)+-[0-9]+$"
    producer: aws_ec2
    consumers:
      - snapshot_orphan
    since: "2026-07-19"

  # ------------------------------------------------------------------
  # aws.ec2.instance.* — instance_to_facts + the correlation post-pass.
  # ------------------------------------------------------------------

  - namespace: aws.ec2.instance
    key: state
    value_type: string
    description: |
      Instance lifecycle state. `stopped` is the
      ec2_stopped_with_storage trigger.
    allowed_values:
      - pending
      - running
      - shutting-down
      - terminated
      - stopping
      - stopped
    producer: aws_ec2
    consumers:
      - ec2_stopped_with_storage
    since: "2026-07-18"

  - namespace: aws.ec2.instance
    key: instance_type
    value_type: string
    description: Instance type, e.g. "m5.xlarge". Archive only in V1 (rightsizing is vague 2).
    producer: aws_ec2
    consumers: []
    since: "2026-07-18"

  - namespace: aws.ec2.instance
    key: launch_time
    value_type: date
    description: Launch timestamp (ISO). Archive only in V1.
    producer: aws_ec2
    consumers: []
    since: "2026-07-18"

  - namespace: aws.ec2.instance
    key: block_device_volume_ids
    value_type: json
    description: |
      EBS volume ids from BlockDeviceMappings (list of strings).
      Always KNOWN — an empty list is a real observation ("no EBS
      block devices"), not a gap.
    producer: aws_ec2
    consumers: []
    since: "2026-07-18"

  - namespace: aws.ec2.instance
    key: attached_volumes
    value_type: json
    description: |
      Correlation fact written by the collector's per-region
      post-pass, for stopped instances only: list of
      {volume_id, size_gb, volume_type} resolved against THIS
      region's volume scan. ABSENT when the volume job failed or
      didn't run — the rule goes INCONCLUSIVE, never guesses.
    producer: aws_ec2
    consumers:
      - ec2_stopped_with_storage
    since: "2026-07-18"

  - namespace: aws.ec2.instance
    key: region
    value_type: string
    description: |
      AWS region of the instance (collector-injected `_region`).
      ec2_stopped_with_storage prices the attached volumes on this
      grid — attached EBS volumes are always in the instance's region
      (attachment is within an AZ), so one fact covers the breakdown.
    pattern: "^[a-z]{2}(-[a-z]+)+-[0-9]+$"
    producer: aws_ec2
    consumers:
      - ec2_stopped_with_storage
    since: "2026-07-19"
