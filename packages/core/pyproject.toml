[project]
name = "constat-core"
version = "0.0.0"
description = "Constat stable contract — models, namespaces, catalog"
requires-python = ">=3.13"
dependencies = [
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/constat_core"]
