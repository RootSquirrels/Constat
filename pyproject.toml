[project]
name = "constat"
version = "0.0.0"
description = "Cloud inventory observability — the écart chiffré"
requires-python = ">=3.13"
dependencies = []

[tool.uv.workspace]
members = [
    "packages/core",
    "packages/connectors/aws_rds",
    "packages/connectors/focus",
    "packages/insights/rds_eol",
    "packages/insights/chargeback",
    "apps/api",
]

[tool.uv]
dev-dependencies = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.6",
    "mypy>=1.10",
    "boto3-stubs[rds]>=1.34",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"
pythonpath = [
    "packages/core/src",
    "packages/connectors/aws_rds/src",
    "packages/connectors/focus/src",
    "packages/insights/rds_eol/src",
    "packages/insights/chargeback/src",
    "apps/api/src",
]

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N", "SIM", "RUF"]
ignore = ["E501"]  # handled by formatter

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011"]  # asserts are fine

[tool.mypy]
python_version = "3.13"
strict = false
files = ["packages/core/src"]

[[tool.mypy.overrides]]
module = "boto3.*"
ignore_missing_imports = true
