# Prometheus alert rules for Constat (roadmap scoreboard "Exploitabilité").
#
# Exactly 3 alerts, one per operational SLO:
#   1. ConstatSourceRunFailed      — a per-region AWS scan failed.
#   2. ConstatScopeStaleIncreasing — insights go INCONCLUSIVE (scope_stale)
#                                    because scans are older than the 24h
#                                    freshness window.
#   3. ConstatHTTP5xxRateHigh      — API error rate above 1%.
#
# Metric names/labels match apps/api/src/constat_api/metrics.py and
# docs/operations/metrics.md exactly. The `reason` label on
# constat_inconclusive_total carries the full human-readable string, so
# scope_stale is matched with a regex prefix.
#
# `runbook_url` is repo-relative for now (the repo has no public URL yet);
# point it at the rendered docs once one exists.
# Operator guidance: docs/operations/alerting.md.

groups:
  - name: constat
    rules:
      - alert: ConstatSourceRunFailed
        # Any failed source_run in the last hour. Scans are the data
        # foundation: a failed region means stale/UNKNOWN inventory for
        # that scope until re-scanned.
        expr: increase(constat_source_run_total{status="failed"}[1h]) > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Constat: AWS source run failed (region {{ $labels.region }})"
          description: >-
            At least one source_run for region {{ $labels.region }} finished
            with status="failed" in the last hour. Check the error column of
            the source_runs table and re-scan the region.
          runbook_url: "docs/operations/alerting.md#constatsourcerunfailed"

      - alert: ConstatScopeStaleIncreasing
        # INCONCLUSIVE records with reason scope_stale are emitted when the
        # latest successful run is older than the 24h freshness window. An
        # increasing count means insights are degrading from "proven" to
        # "we don't know" — the product's core promise is at risk.
        expr: increase(constat_inconclusive_total{reason=~"scope_stale.*"}[6h]) > 0
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Constat: scopes going stale (rule {{ $labels.rule }})"
          description: >-
            Rule {{ $labels.rule }} emitted INCONCLUSIVE(scope_stale) records
            in the last 6h: successful source runs are older than the 24h
            freshness window. Verify the scan scheduler is running and that
            recent source_runs are succeeding.
          runbook_url: "docs/operations/alerting.md#constatscopestaleincreasing"

      - alert: ConstatHTTP5xxRateHigh
        # 5xx share of all tracked HTTP requests above 1% over 5m, guarded
        # by a minimum traffic floor so a single request in a quiet window
        # does not page anyone. /metrics and /health are excluded from the
        # underlying counter by the middleware.
        expr: >-
          sum(rate(constat_http_requests_total{status=~"5.."}[5m]))
          /
          sum(rate(constat_http_requests_total[5m]))
          > 0.01
          and
          sum(rate(constat_http_requests_total[5m])) > 0.1
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Constat: HTTP 5xx rate above 1%"
          description: >-
            More than 1% of API requests returned 5xx over the last 10
            minutes. Check the API logs (request_id correlates) and
            /health for dependency failures (Postgres).
          runbook_url: "docs/operations/alerting.md#constathttp5xxratehigh"
