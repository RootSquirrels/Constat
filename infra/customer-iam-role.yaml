AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Constat prospect-side IAM role. Deployed in the PROSPECT's AWS
  account; trusted by the Constat SaaS account. Grants the minimum
  read-only permissions the SaaS needs to scan the prospect's RDS
  fleet (DB instances/clusters) and EC2/EBS estate (volumes,
  snapshots, instances) — the resource types covered by the pilot
  SLA. External ID enforces confused-deputy protection.

  P1 item 2: the prospect's trust policy was previously a doc note.
  This template makes it a one-click CloudFormation stack.

# ----------------------------------------------------------------------------
# Parameters
# ----------------------------------------------------------------------------

Parameters:
  ConstatAccountId:
    Type: String
    Description: >
      The AWS account ID of the Constat SaaS that will assume this role.
      Provided by the Constat team during onboarding. Format: 12 digits.
    AllowedPattern: '^\d{12}$'
    ConstraintDescription: Must be a 12-digit AWS account ID

  ConstatRoleName:
    Type: String
    Default: constat-collector
    Description: >
      The role name the SaaS will look for via sts:AssumeRole. The
      SaaS-side IAM policy (apps/infra/iam.tf) restricts the AssumeRole
      grant to 'arn:aws:iam::*:role/constat-collector*' — keep the
      name starting with that prefix.
    AllowedPattern: '^constat-collector[a-zA-Z0-9_-]*$'
    ConstraintDescription: Must start with 'constat-collector'

  ExternalId:
    Type: String
    Description: >
      Shared secret between the prospect and the SaaS. Prevents the
      confused-deputy attack: even if another principal in the SaaS
      account is compromised, it cannot assume this role without
      knowing the ExternalId. Generated by the Constat team during
      onboarding (typically a 32+ char random string), kept in the
      prospect's password manager.
    NoEcho: true
    MinLength: 16
    MaxLength: 64

  TagsCostCenter:
    Type: String
    Default: ""
    Description: >
      Optional. Cost-center tag applied to the role for billing
      attribution. Empty string = no tag.
    AllowedPattern: '^$|^[a-zA-Z0-9 _\-]{1,50}$'

# ----------------------------------------------------------------------------
# Resources
# ----------------------------------------------------------------------------

Resources:
  ConstatCollectorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref ConstatRoleName
      Description: >
        Read-only cross-account role for Constat SaaS. Trust bound to
        the SaaS account + ExternalId (F-06 confused-deputy).
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              # The Constat SaaS account (single AWS account in V1).
              # The SaaS-side task role is the only thing that calls
              # sts:AssumeRole into this role — see apps/infra/iam.tf.
              AWS:
                - !Sub "arn:aws:iam::${ConstatAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                # The Constat team's call to sts:AssumeRole MUST include
                # this ExternalId. The SaaS collector refuses the call
                # if ExternalId is missing (apps/api/.../collectors/aws.py
                # raises ValueError).
                sts:ExternalId: !Ref ExternalId
              # Optional tightening: limit the source IP to the SaaS's
              # egress NAT. NOT enforced in V1 (the SaaS runs in ECS
              # Fargate without predictable IPs). When the SaaS is
              # behind a known NAT, the customer can add an aws:SourceIp
              # condition here.
      Tags:
        - Key: ManagedBy
          Value: constat-collector-stack
        - Key: CostCenter
          Value: !Ref TagsCostCenter
      Policies:
        - PolicyName: constat-collector-readonly
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # ---- RDS: list and describe instances ----
              # The SaaS scans RDS to find Extended Support exposure.
              # Listing the regions + DescribeDBInstances is the only
              # API it calls. rds:Describe* is read-only.
              - Sid: RdsRead
                Effect: Allow
                Action:
                  - rds:DescribeDBInstances
                  - rds:DescribeDBClusters
                  - rds:DescribeDBEngineVersions
                Resource: "*"

              # ---- EC2/EBS: volumes, snapshots, instances ----
              # The SaaS also scans the EBS estate (gp2→gp3 savings,
              # unattached volumes, orphan snapshots) and EC2 instance
              # states (stopped instances still billing storage). These
              # are exactly the calls the collector makes — paginated
              # DescribeVolumes / DescribeSnapshots (OwnerIds=self) /
              # DescribeInstances, see
              # packages/connectors/aws_ec2/.../collector.py. All
              # read-only; Describe* cannot be resource-scoped, hence "*".
              # ec2:DescribeAddresses is deliberately NOT granted: Elastic
              # IP cost is out of scope in V1 (stated in the
              # ec2_stopped_with_storage resolver), so the SaaS never
              # calls it and the permission would be dead grant.
              - Sid: Ec2Read
                Effect: Allow
                Action:
                  - ec2:DescribeVolumes
                  - ec2:DescribeSnapshots
                  - ec2:DescribeInstances
                Resource: "*"

              # ---- EC2 tag pass-through (for Self-Tag) ----
              # The SaaS tags every read with its own session ID
              # (apps/api/.../collectors/aws.py sets a session name
              # like 'constat-<uuid>'). For that, it needs iam:TagSession
              # on its own role — but on THIS prospect side, we
              # also grant iam:GetRole so the SaaS can verify its
              # own role definition if it needs to. NO iam:PassRole
              # (confused-deputy mitigation).
              - Sid: IamRead
                Effect: Allow
                Action:
                  - iam:GetRole
                Resource: !GetAtt ConstatCollectorRole.Arn

              # ---- STS Self-Tag ----
              # The SaaS calls sts:TagSession to attach a session
              # tag (its request_id from X-Request-ID). This is what
              # makes the prospect's CloudTrail show "this is the
              # SaaS's scan, not a human". Without Self-Tag, the
              # prospect can't tell which scan did what.
              - Sid: StsSelfTag
                Effect: Allow
                Action:
                  - sts:TagSession
                Resource: "*"

# ----------------------------------------------------------------------------
# Outputs
# ----------------------------------------------------------------------------

Outputs:
  RoleArn:
    Description: >
      ARN of the role. Share with the Constat team during onboarding.
      They will configure this ARN + the matching ExternalId in their
      collector targets.
    Value: !GetAtt ConstatCollectorRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-RoleArn"

  RoleName:
    Description: Name of the role (for reference).
    Value: !Ref ConstatRoleName

  StackVersion:
    Description: Version of this template. Bump on material changes.
    # 1.1.0 (2026-07-19): added Ec2Read (DescribeVolumes/Snapshots/Instances).
    Value: "1.1.0"
