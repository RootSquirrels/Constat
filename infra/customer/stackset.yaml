AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Constat collector role — CloudFormation StackSets sibling of
  infra/customer-iam-role.yaml, for customers with AWS Organizations
  (roadmap 1.3: batch onboarding).

  Deployed as a STACKSET from the customer's management account (or a
  delegated administrator) across the whole organization or selected
  OUs, so 35 member accounts get the same read-only collector role in
  one operation instead of 35 individual stacks.

  Same trust model as the single-account template: trusted by the
  Constat SaaS account (PrincipalAccountId), guarded by an ExternalId
  (F-06 confused-deputy mitigation). One ExternalId per CUSTOMER (not
  per account): the SaaS stores it once per tenant in collect_targets;
  rotation = stack update with the new parameter value + re-import of
  the targets CSV (upsert).

  Coverage (same as the single-account template, matching the pilot
  SLA's resource types): RDS DB instances/clusters, EBS volumes, EBS
  snapshots, EC2 instances — all read-only Describe calls.

  Recommended: SERVICE-MANAGED permissions (the StackSet assumes
  AWSCloudFormationStackSetAdministrationRole / ExecutionRole). That
  avoids hand-managing self-managed execution roles in every member
  account.

  Like its single-account sibling, this template is NOT deployed or
  validated by the Constat team — the customer's AWS admin deploys it
  in their own organization. Review it before deploying.

# ----------------------------------------------------------------------------
# Parameters
# ----------------------------------------------------------------------------

Parameters:
  PrincipalAccountId:
    Type: String
    Description: >
      The AWS account ID of the Constat SaaS that will assume this role.
      Provided by the Constat team during onboarding. Format: 12 digits.
      (Named PrincipalAccountId rather than ConstatAccountId because in
      a StackSet context the parameter reads as "who do I trust".)
    AllowedPattern: '^\d{12}$'
    ConstraintDescription: Must be a 12-digit AWS account ID

  ConstatRoleName:
    Type: String
    Default: constat-collector
    Description: >
      The role name the SaaS will look for via sts:AssumeRole. Keep the
      default: the SaaS-side IAM policy (infra/iam.tf) restricts the
      AssumeRole grant to 'arn:aws:iam::*:role/constat-collector*', and
      the onboarding CLI (python -m constat_api.cli.onboard) generates
      role ARNs with this exact name.
    AllowedPattern: '^constat-collector[a-zA-Z0-9_-]*$'
    ConstraintDescription: Must start with 'constat-collector'

  ExternalId:
    Type: String
    Description: >
      Shared secret between the customer and the SaaS. Prevents the
      confused-deputy attack: even if another principal in the SaaS
      account is compromised, it cannot assume this role without knowing
      the ExternalId. ONE value per customer, generated by the Constat
      team during onboarding (typically 32+ chars). Rotation = update
      this stack parameter AND re-import the targets CSV on the SaaS
      side (POST /collect/targets/import, upsert semantics).
    NoEcho: true
    MinLength: 16
    MaxLength: 64

  TagsCostCenter:
    Type: String
    Default: ""
    Description: >
      Optional. Cost-center tag applied to the role for billing
      attribution. Empty string = no tag.
    AllowedPattern: '^$|^[a-zA-Z0-9 _\-]{1,50}$'

# ----------------------------------------------------------------------------
# Resources — identical permissions to infra/customer-iam-role.yaml
# ----------------------------------------------------------------------------

Resources:
  ConstatCollectorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref ConstatRoleName
      Description: >
        Read-only cross-account role for Constat SaaS. Trust bound to
        the SaaS account + ExternalId (F-06 confused-deputy). Deployed
        via StackSets across the organization.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              # The Constat SaaS account (single AWS account in V1).
              # The SaaS-side task role is the only thing that calls
              # sts:AssumeRole into this role — see infra/iam.tf.
              AWS:
                - !Sub "arn:aws:iam::${PrincipalAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                # The Constat team's call to sts:AssumeRole MUST include
                # this ExternalId. The SaaS collector refuses the call
                # if ExternalId is missing (apps/api/.../collectors/aws.py
                # raises ValueError).
                sts:ExternalId: !Ref ExternalId
      Tags:
        - Key: ManagedBy
          Value: constat-collector-stackset
        - Key: CostCenter
          Value: !Ref TagsCostCenter
      Policies:
        - PolicyName: constat-collector-readonly
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # ---- RDS: list and describe instances ----
              # The SaaS scans RDS to find Extended Support exposure.
              # rds:Describe* is read-only.
              - Sid: RdsRead
                Effect: Allow
                Action:
                  - rds:DescribeDBInstances
                  - rds:DescribeDBClusters
                  - rds:DescribeDBEngineVersions
                Resource: "*"

              # ---- EC2/EBS: volumes, snapshots, instances ----
              # The SaaS also scans the EBS estate (gp2→gp3 savings,
              # unattached volumes, orphan snapshots) and EC2 instance
              # states (stopped instances still billing storage). These
              # are exactly the calls the collector makes — paginated
              # DescribeVolumes / DescribeSnapshots (OwnerIds=self) /
              # DescribeInstances, see
              # packages/connectors/aws_ec2/.../collector.py. All
              # read-only; Describe* cannot be resource-scoped, hence "*".
              # ec2:DescribeAddresses is deliberately NOT granted: Elastic
              # IP cost is out of scope in V1 (stated in the
              # ec2_stopped_with_storage resolver), so the SaaS never
              # calls it and the permission would be dead grant.
              - Sid: Ec2Read
                Effect: Allow
                Action:
                  - ec2:DescribeVolumes
                  - ec2:DescribeSnapshots
                  - ec2:DescribeInstances
                Resource: "*"

              # ---- IAM self-read ----
              # Lets the SaaS verify its own role definition. NO
              # iam:PassRole (confused-deputy mitigation).
              - Sid: IamRead
                Effect: Allow
                Action:
                  - iam:GetRole
                Resource: !GetAtt ConstatCollectorRole.Arn

              # ---- STS Self-Tag ----
              # The SaaS calls sts:TagSession to attach its request_id,
              # so the customer's CloudTrail shows "this is the SaaS's
              # scan, not a human".
              - Sid: StsSelfTag
                Effect: Allow
                Action:
                  - sts:TagSession
                Resource: "*"

# ----------------------------------------------------------------------------
# Outputs
# ----------------------------------------------------------------------------

Outputs:
  RoleArn:
    Description: >
      ARN of the role created in EACH member account. The SaaS builds
      the same ARN per account from the account id + role name — see
      python -m constat_api.cli.onboard, which emits an import-ready CSV.
    Value: !GetAtt ConstatCollectorRole.Arn

  RoleName:
    Description: Name of the role (for reference).
    Value: !Ref ConstatRoleName

  StackVersion:
    Description: Version of this template. Bump on material changes.
    # 1.1.0 (2026-07-19): added Ec2Read (DescribeVolumes/Snapshots/Instances).
    Value: "1.1.0"
