<svg viewBox="0 0 1440 960" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, 'Segoe UI', sans-serif" role="img">
  <title>Constat — Architecture V1 (pilote)</title>
  <desc>Vue déploiement et flux : comptes AWS du client en lecture seule, plateforme Constat dédiée en eu-west-3, côté utilisateur via proxy serveur ; chaîne de preuve, anti-dérive et fondation multi-tenant en garanties transverses.</desc>

  <defs>
    <marker id="fa" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#4f46e5"/>
    </marker>
  </defs>

  <!-- ================= TITLE BLOCK ================= -->
  <text x="30" y="42" font-size="24" font-weight="700" fill="#0f172a">Constat — Architecture V1 <tspan font-weight="400" fill="#475569">(pilote payant, instance dédiée)</tspan></text>
  <text x="30" y="64" font-size="12.5" fill="#475569">Vue déploiement &amp; flux · Version 1.0 · 2026-07-18 · Statut : implémenté, audité ×3 (statique) — CI Postgres, apply Terraform et restauration : à observer au déploiement</text>
  <text x="1410" y="42" font-size="12" fill="#475569" text-anchor="end">— flux de données (numérotés)</text>
  <line x1="1290" y1="38" x2="1320" y2="38" stroke="#4f46e5" stroke-width="2.5" marker-end="url(#fa)"/>
  <text x="1410" y="62" font-size="12" fill="#b45309" text-anchor="end">▪ contrôle de sécurité</text>

  <!-- ================= ZONE CLIENT ================= -->
  <rect x="30" y="88" width="310" height="562" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="50" y="116" font-size="13" font-weight="700" fill="#475569" letter-spacing="1">COMPTES AWS DU CLIENT <tspan font-weight="400">(×5 pilote)</tspan></text>

  <rect x="50" y="132" width="270" height="88" rx="7" fill="#ffffff" stroke="#94a3b8"/>
  <text x="185" y="154" font-size="13.5" font-weight="600" fill="#0f172a" text-anchor="middle">Rôle IAM lecture seule</text>
  <text x="185" y="172" font-size="11" fill="#475569" text-anchor="middle">déployé par template CloudFormation versionné</text>
  <text x="185" y="190" font-size="11" fill="#b45309" text-anchor="middle">▪ trust restreint au principal Constat</text>
  <text x="185" y="206" font-size="11" fill="#b45309" text-anchor="middle">▪ External ID unique, obligatoire</text>

  <rect x="50" y="248" width="270" height="96" rx="7" fill="#ffffff" stroke="#94a3b8"/>
  <text x="185" y="270" font-size="13.5" font-weight="600" fill="#0f172a" text-anchor="middle">APIs de ressources</text>
  <text x="185" y="290" font-size="11" fill="#475569" text-anchor="middle">RDS / Aurora · EC2 · EBS · Snapshots</text>
  <text x="185" y="306" font-size="11" fill="#475569" text-anchor="middle">describe* uniquement — métadonnées,</text>
  <text x="185" y="321" font-size="11" fill="#475569" text-anchor="middle">jamais de contenu ni de secrets</text>

  <rect x="50" y="372" width="270" height="76" rx="7" fill="#ffffff" stroke="#94a3b8"/>
  <text x="185" y="394" font-size="13.5" font-weight="600" fill="#0f172a" text-anchor="middle">AWS Data Exports — FOCUS 1.0</text>
  <text x="185" y="412" font-size="11" fill="#475569" text-anchor="middle">export de facturation normalisé (CSV)</text>
  <text x="185" y="428" font-size="11" fill="#475569" text-anchor="middle">fourni par le client au format standard</text>

  <text x="185" y="490" font-size="11.5" fill="#475569" text-anchor="middle" font-style="italic">Aucun agent. Aucune access key.</text>
  <text x="185" y="508" font-size="11.5" fill="#475569" text-anchor="middle" font-style="italic">Révocation instantanée :</text>
  <text x="185" y="524" font-size="11.5" fill="#475569" text-anchor="middle" font-style="italic">supprimer le rôle suffit.</text>
  <text x="185" y="560" font-size="11" fill="#b45309" text-anchor="middle">▪ aucune capacité d'écriture côté Constat</text>

  <!-- ================= ZONE PLATEFORME ================= -->
  <rect x="370" y="88" width="700" height="700" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="390" y="116" font-size="13" font-weight="700" fill="#475569" letter-spacing="1">PLATEFORME CONSTAT — eu-west-3 (Paris) · une instance par client</text>

  <!-- scheduler -->
  <rect x="390" y="136" width="180" height="70" rx="7" fill="#ffffff" stroke="#94a3b8"/>
  <text x="480" y="160" font-size="13" font-weight="600" fill="#0f172a" text-anchor="middle">EventBridge Scheduler</text>
  <text x="480" y="178" font-size="11" fill="#475569" text-anchor="middle">déclenchement quotidien</text>
  <text x="480" y="193" font-size="11" fill="#475569" text-anchor="middle">05:00 UTC</text>

  <!-- scan task -->
  <rect x="610" y="130" width="440" height="128" rx="7" fill="#ffffff" stroke="#94a3b8"/>
  <text x="830" y="152" font-size="13.5" font-weight="600" fill="#0f172a" text-anchor="middle">Tâche ECS Fargate — collecte &amp; évaluation</text>
  <rect x="624" y="164" width="132" height="80" rx="5" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="690" y="184" font-size="11.5" font-weight="600" fill="#0f172a" text-anchor="middle">Collecteur AWS</text>
  <text x="690" y="200" font-size="10" fill="#475569" text-anchor="middle">retry adaptatif</text>
  <text x="690" y="214" font-size="10" fill="#475569" text-anchor="middle">circuit breaker</text>
  <text x="690" y="228" font-size="10" fill="#475569" text-anchor="middle">SourceRun par scope</text>
  <rect x="766" y="164" width="132" height="80" rx="5" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="832" y="184" font-size="11.5" font-weight="600" fill="#0f172a" text-anchor="middle">Ingestion FOCUS</text>
  <text x="832" y="200" font-size="10" fill="#475569" text-anchor="middle">validation spec 1.0</text>
  <text x="832" y="214" font-size="10" fill="#475569" text-anchor="middle">rejet des exports</text>
  <text x="832" y="228" font-size="10" fill="#475569" text-anchor="middle">non conformes</text>
  <rect x="908" y="164" width="132" height="80" rx="5" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="974" y="184" font-size="11.5" font-weight="600" fill="#0f172a" text-anchor="middle">Runner de règles</text>
  <text x="974" y="200" font-size="10" fill="#475569" text-anchor="middle">--all : tout le registre</text>
  <text x="974" y="214" font-size="10" fill="#475569" text-anchor="middle">déterministe, rejouable</text>
  <text x="974" y="228" font-size="10" fill="#475569" text-anchor="middle">+ valorisation (ADR-13)</text>

  <!-- API service -->
  <rect x="610" y="300" width="290" height="104" rx="7" fill="#ffffff" stroke="#94a3b8"/>
  <text x="755" y="322" font-size="13.5" font-weight="600" fill="#0f172a" text-anchor="middle">Service API — FastAPI</text>
  <text x="755" y="341" font-size="11" fill="#475569" text-anchor="middle">insights · inconclusifs (acquittement) · exports CSV</text>
  <text x="755" y="357" font-size="11" fill="#475569" text-anchor="middle">/metrics · pagination bornée</text>
  <text x="755" y="376" font-size="11" fill="#b45309" text-anchor="middle">▪ clé API (comparaison constant-time)</text>
  <text x="755" y="392" font-size="11" fill="#b45309" text-anchor="middle">▪ contexte tenant (GUC) posé par transaction</text>

  <!-- ALB -->
  <rect x="930" y="308" width="120" height="88" rx="7" fill="#ffffff" stroke="#94a3b8"/>
  <text x="990" y="330" font-size="13" font-weight="600" fill="#0f172a" text-anchor="middle">ALB</text>
  <text x="990" y="348" font-size="11" fill="#b45309" text-anchor="middle">▪ TLS (ACM)</text>
  <text x="990" y="364" font-size="11" fill="#475569" text-anchor="middle">443 · HTTP→HTTPS</text>
  <text x="990" y="380" font-size="11" fill="#475569" text-anchor="middle">CIDR restreint</text>

  <!-- RDS -->
  <rect x="390" y="446" width="390" height="128" rx="7" fill="#ffffff" stroke="#94a3b8"/>
  <text x="585" y="468" font-size="13.5" font-weight="600" fill="#0f172a" text-anchor="middle">PostgreSQL 16 (RDS) — état canonique</text>
  <text x="585" y="488" font-size="11" fill="#475569" text-anchor="middle">runs · ressources · observations (immuables) · facts courants</text>
  <text x="585" y="504" font-size="11" fill="#475569" text-anchor="middle">évaluations &amp; verdicts · journal d'audit · politiques de rétention</text>
  <text x="585" y="526" font-size="11" fill="#b45309" text-anchor="middle">▪ RLS forcée sur les 13 tables (tenant_id partout)</text>
  <text x="585" y="542" font-size="11" fill="#b45309" text-anchor="middle">▪ rôle runtime non-owner : DML seul, ne peut pas altérer les policies</text>
  <text x="585" y="560" font-size="11" fill="#475569" text-anchor="middle">chiffré au repos (KMS) · PITR</text>

  <!-- S3 -->
  <rect x="810" y="446" width="240" height="128" rx="7" fill="#ffffff" stroke="#94a3b8"/>
  <text x="930" y="468" font-size="13.5" font-weight="600" fill="#0f172a" text-anchor="middle">S3 — dépôts bruts</text>
  <text x="930" y="488" font-size="11" fill="#475569" text-anchor="middle">exports FOCUS d'origine,</text>
  <text x="930" y="504" font-size="11" fill="#475569" text-anchor="middle">conservés tels quels :</text>
  <text x="930" y="520" font-size="11" fill="#475569" text-anchor="middle">rejouables et auditables</text>
  <text x="930" y="546" font-size="10.5" fill="#94a3b8" text-anchor="middle" font-style="italic">(MinIO : équivalent local</text>
  <text x="930" y="560" font-size="10.5" fill="#94a3b8" text-anchor="middle" font-style="italic">de développement)</text>

  <!-- ops row -->
  <rect x="390" y="606" width="200" height="96" rx="7" fill="#ffffff" stroke="#94a3b8"/>
  <text x="490" y="628" font-size="12.5" font-weight="600" fill="#0f172a" text-anchor="middle">Secrets Manager</text>
  <text x="490" y="646" font-size="10.5" fill="#475569" text-anchor="middle">DSN du rôle runtime</text>
  <text x="490" y="661" font-size="10.5" fill="#475569" text-anchor="middle">clé API · cibles de scan</text>
  <text x="490" y="680" font-size="10.5" fill="#b45309" text-anchor="middle">▪ aucun secret en clair</text>
  <text x="490" y="694" font-size="10.5" fill="#b45309" text-anchor="middle">dans le code ou l'image</text>

  <rect x="620" y="606" width="210" height="96" rx="7" fill="#ffffff" stroke="#94a3b8"/>
  <text x="725" y="628" font-size="12.5" font-weight="600" fill="#0f172a" text-anchor="middle">Exploitation</text>
  <text x="725" y="646" font-size="10.5" fill="#475569" text-anchor="middle">logs corrélés request_id ·</text>
  <text x="725" y="660" font-size="10.5" fill="#475569" text-anchor="middle">source_run_id · métriques de</text>
  <text x="725" y="674" font-size="10.5" fill="#475569" text-anchor="middle">fraîcheur et d'incomplétude</text>
  <text x="725" y="692" font-size="10.5" fill="#475569" text-anchor="middle">alertes avec runbooks</text>

  <rect x="860" y="606" width="190" height="96" rx="7" fill="#ffffff" stroke="#94a3b8"/>
  <text x="955" y="628" font-size="12.5" font-weight="600" fill="#0f172a" text-anchor="middle">Livraison</text>
  <text x="955" y="646" font-size="10.5" fill="#475569" text-anchor="middle">image unique (ECR)</text>
  <text x="955" y="660" font-size="10.5" fill="#475569" text-anchor="middle">API + tâches · Terraform</text>
  <text x="955" y="674" font-size="10.5" fill="#475569" text-anchor="middle">CI : lint, types, tests,</text>
  <text x="955" y="688" font-size="10.5" fill="#475569" text-anchor="middle">migrations + RLS sur Postgres</text>

  <text x="720" y="740" font-size="11" fill="#475569" text-anchor="middle" font-style="italic">Deux rôles d'exécution, un seul code : la tâche planifiée écrit, le service API lit. Aucune file, aucun cluster — proportionné au pilote,</text>
  <text x="720" y="756" font-size="11" fill="#475569" text-anchor="middle" font-style="italic">seuils d'évolution écrits (traitement asynchrone au-delà de 5 comptes).</text>

  <!-- ================= ZONE UTILISATEUR ================= -->
  <rect x="1100" y="88" width="310" height="380" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="1120" y="116" font-size="13" font-weight="700" fill="#475569" letter-spacing="1">CÔTÉ UTILISATEUR</text>

  <rect x="1120" y="136" width="270" height="64" rx="7" fill="#ffffff" stroke="#94a3b8"/>
  <text x="1255" y="160" font-size="13" font-weight="600" fill="#0f172a" text-anchor="middle">Navigateur</text>
  <text x="1255" y="178" font-size="11" fill="#b45309" text-anchor="middle">▪ ne détient jamais la clé API</text>

  <rect x="1120" y="232" width="270" height="92" rx="7" fill="#ffffff" stroke="#94a3b8"/>
  <text x="1255" y="254" font-size="13" font-weight="600" fill="#0f172a" text-anchor="middle">Next.js — rendu serveur</text>
  <text x="1255" y="272" font-size="11" fill="#475569" text-anchor="middle">insights · inconclusifs · chargeback ·</text>
  <text x="1255" y="287" font-size="11" fill="#475569" text-anchor="middle">restitution POC imprimable</text>
  <text x="1255" y="308" font-size="11" fill="#b45309" text-anchor="middle">▪ proxy : X-API-Key injectée côté serveur</text>

  <text x="1255" y="360" font-size="11.5" fill="#475569" text-anchor="middle" font-style="italic">La restitution sépare structurellement :</text>
  <text x="1255" y="378" font-size="11.5" fill="#0f172a" text-anchor="middle">économies évitables (estimées, sourcées)</text>
  <text x="1255" y="394" font-size="11.5" fill="#0f172a" text-anchor="middle">≠ coûts observés (FOCUS)</text>
  <text x="1255" y="410" font-size="11.5" fill="#0f172a" text-anchor="middle">≠ écarts comptables — jamais agrégés</text>

  <!-- ================= FLOWS ================= -->
  <!-- 1 scheduler -> task -->
  <line x1="570" y1="171" x2="606" y2="171" stroke="#4f46e5" stroke-width="2" marker-end="url(#fa)"/>
  <circle cx="588" cy="156" r="9" fill="#4f46e5"/><text x="588" y="160" font-size="10.5" fill="#ffffff" text-anchor="middle" font-weight="700">1</text>

  <!-- 2 task -> role (assume) -->
  <path d="M 610 200 C 500 210, 420 190, 324 180" fill="none" stroke="#4f46e5" stroke-width="2" marker-end="url(#fa)"/>
  <circle cx="452" cy="184" r="9" fill="#4f46e5"/><text x="452" y="188" font-size="10.5" fill="#ffffff" text-anchor="middle" font-weight="700">2</text>
  <text x="452" y="212" font-size="10.5" fill="#4f46e5" text-anchor="middle">AssumeRole (STS)</text>

  <!-- 3 apis -> task -->
  <path d="M 324 288 C 460 288, 540 236, 620 222" fill="none" stroke="#4f46e5" stroke-width="2" marker-end="url(#fa)"/>
  <circle cx="470" cy="270" r="9" fill="#4f46e5"/><text x="470" y="274" font-size="10.5" fill="#ffffff" text-anchor="middle" font-weight="700">3</text>
  <text x="470" y="296" font-size="10.5" fill="#4f46e5" text-anchor="middle">métadonnées paginées</text>

  <!-- 4 focus -> ingestion -->
  <path d="M 324 408 C 500 412, 700 300, 800 250" fill="none" stroke="#4f46e5" stroke-width="2" marker-end="url(#fa)"/>
  <circle cx="520" cy="392" r="9" fill="#4f46e5"/><text x="520" y="396" font-size="10.5" fill="#ffffff" text-anchor="middle" font-weight="700">4</text>
  <text x="524" y="418" font-size="10.5" fill="#4f46e5" text-anchor="middle">exports FOCUS</text>

  <!-- 5 task -> RDS -->
  <line x1="700" y1="258" x2="600" y2="442" stroke="#4f46e5" stroke-width="2" marker-end="url(#fa)"/>
  <circle cx="655" cy="350" r="9" fill="#4f46e5"/><text x="655" y="354" font-size="10.5" fill="#ffffff" text-anchor="middle" font-weight="700">5</text>
  <text x="588" y="350" font-size="10.5" fill="#4f46e5" text-anchor="end">observations + facts</text>
  <text x="588" y="364" font-size="10.5" fill="#4f46e5" text-anchor="end">+ SourceRun + verdicts</text>

  <!-- 6 ingestion -> S3 -->
  <line x1="870" y1="258" x2="920" y2="442" stroke="#4f46e5" stroke-width="2" marker-end="url(#fa)"/>
  <circle cx="900" cy="350" r="9" fill="#4f46e5"/><text x="900" y="354" font-size="10.5" fill="#ffffff" text-anchor="middle" font-weight="700">6</text>
  <text x="916" y="336" font-size="10.5" fill="#4f46e5">dépôt brut conservé</text>

  <!-- 7 browser -> next -->
  <line x1="1255" y1="200" x2="1255" y2="228" stroke="#4f46e5" stroke-width="2" marker-end="url(#fa)"/>
  <circle cx="1270" cy="214" r="9" fill="#4f46e5"/><text x="1270" y="218" font-size="10.5" fill="#ffffff" text-anchor="middle" font-weight="700">7</text>

  <!-- 8 next -> ALB -->
  <path d="M 1120 300 C 1090 310, 1080 330, 1054 344" fill="none" stroke="#4f46e5" stroke-width="2" marker-end="url(#fa)"/>
  <circle cx="1084" cy="316" r="9" fill="#4f46e5"/><text x="1084" y="320" font-size="10.5" fill="#ffffff" text-anchor="middle" font-weight="700">8</text>
  <text x="1086" y="298" font-size="10.5" fill="#4f46e5" text-anchor="middle">HTTPS</text>

  <!-- 9 ALB -> API -->
  <line x1="926" y1="352" x2="904" y2="352" stroke="#4f46e5" stroke-width="2" marker-end="url(#fa)"/>
  <circle cx="915" cy="336" r="9" fill="#4f46e5"/><text x="915" y="340" font-size="10.5" fill="#ffffff" text-anchor="middle" font-weight="700">9</text>

  <!-- 10 API -> RDS -->
  <line x1="680" y1="404" x2="620" y2="442" stroke="#4f46e5" stroke-width="2" marker-end="url(#fa)"/>
  <circle cx="662" cy="426" r="10" fill="#4f46e5"/><text x="662" y="430" font-size="9.5" fill="#ffffff" text-anchor="middle" font-weight="700">10</text>
  <text x="700" y="432" font-size="10.5" fill="#4f46e5">lecture sous contexte tenant (RLS)</text>

  <!-- ================= GARANTIES ================= -->
  <rect x="30" y="812" width="1380" height="126" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="50" y="840" font-size="13" font-weight="700" fill="#4f46e5" letter-spacing="1">GARANTIES TRANSVERSES — ce qui rend un chiffre défendable</text>

  <text x="50" y="866" font-size="12" font-weight="600" fill="#0f172a">Chaîne de preuve</text>
  <text x="50" y="884" font-size="11" fill="#334155">chaque chiffre → fact → observation → SourceRun complet et frais (≤ 24 h) ;</text>
  <text x="50" y="900" font-size="11" fill="#334155">verdicts Écart chiffré / Conforme / Inconclusif — l'absence de preuve est</text>
  <text x="50" y="916" font-size="11" fill="#334155">affichée, motivée et acquittable, jamais convertie en fausse conclusion.</text>

  <text x="530" y="866" font-size="12" font-weight="600" fill="#0f172a">Anti-dérive</text>
  <text x="530" y="884" font-size="11" fill="#334155">registres épinglés par tests : règles ↔ valorisation ↔ UI ↔ scheduler --all ;</text>
  <text x="530" y="900" font-size="11" fill="#334155">évaluations pures et rejouables à date fixée ; référentiels (EOL, tarifs)</text>
  <text x="530" y="916" font-size="11" fill="#334155">versionnés, sourcés et datés ; CI rejoue les migrations sur base vierge.</text>

  <text x="1010" y="866" font-size="12" font-weight="600" fill="#0f172a">Multi-tenant &amp; données</text>
  <text x="1010" y="884" font-size="11" fill="#334155">tenant_id sur toute donnée + RLS forcée (fondation — résolution du</text>
  <text x="1010" y="900" font-size="11" fill="#334155">tenant par requête : V2) ; rétention et purge par table ; PII en hash ;</text>
  <text x="1010" y="916" font-size="11" fill="#334155">réversibilité : export intégral + suppression attestée en fin de pilote.</text>
</svg>
