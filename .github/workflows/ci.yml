name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    services:
      # Mirrors docker-compose.yml. Needed by the Postgres-marked tests
      # (tests/test_rls.py) which apply Alembic migrations (see ADR-17)
      # and verify RLS.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: constat
          POSTGRES_PASSWORD: constat
          POSTGRES_DB: constat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U constat -d constat"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        # --frozen: fail if uv.lock is missing or out of sync with
        # pyproject.toml. Never re-resolve in CI (audit F-11).
        # --all-packages: install the workspace members (constat-api and
        # its deps: fastapi, sqlalchemy, ...) — plain `uv sync` only
        # installs the root project, which has no dependencies.
        run: uv sync --frozen --all-extras --all-packages

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Lint format check (ruff)
        run: uv run ruff format --check .

      - name: Type-check core
        run: uv run mypy packages/core/src

      - name: Apply migrations
        # Alembic (db/alembic/, see ADR-17). Catches broken migration
        # chains (a model referencing a column no revision added) on a
        # pristine database. The env var must match the service block
        # above so the URL is the owner role, not the runtime role.
        env:
          CONSTAT_DATABASE_URL: postgresql://constat:constat@localhost:5432/constat
        run: uv run --frozen alembic -c db/alembic.ini upgrade head

      - name: Test
        run: uv run pytest -v

      - name: Supply-chain audit (pip-audit)
        # Advisory until the findings baseline is triaged — flip
        # continue-on-error to false once the baseline is clean.
        continue-on-error: true
        run: uv run --with pip-audit pip-audit --strict

  postgres-rls:
    # Separate job (P0-2 hardening): the RLS suite is the audit-grade
    # proof that tenant isolation works against a real Postgres, not
    # sqlite. Splitting it out gives the PR UI a single named check
    # (was: a buried step inside `python` whose failure could be hidden
    # by an earlier migration step). Both URLs are required:
    # CONSTAT_TEST_DATABASE_URL is the owner role (can create policies
    # and seed); CONSTAT_TEST_APP_DATABASE_URL is the non-owner runtime
    # role (migration 0012) that must fail on ALTER POLICY.
    name: Postgres RLS
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: constat
          POSTGRES_PASSWORD: constat
          POSTGRES_DB: constat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U constat -d constat"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync --frozen --all-extras --all-packages

      - name: Test (Postgres RLS)
        # psycopg is injected here only: it is not a project dependency
        # (the API is dialect-agnostic, tests run on sqlite by default).
        # CONSTAT_TEST_APP_DATABASE_URL is the non-owner runtime role
        # (migration 0012) exercised by the TestRuntimeRole tests.
        # The whole suite runs with -m postgres: RLS (test_rls.py) AND
        # audit immutability (test_audit_immutability.py, migration 0014).
        env:
          CONSTAT_TEST_DATABASE_URL: postgresql://constat:constat@localhost:5432/constat
          CONSTAT_TEST_APP_DATABASE_URL: postgresql://constat_app:constat@localhost:5432/constat
        run: uv run --frozen --with "psycopg[binary]>=3.1" pytest -m postgres -v

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci
      - run: npm run build

      - name: Supply-chain audit (npm audit)
        # Advisory until the findings baseline is triaged — flip
        # continue-on-error to false once the baseline is clean.
        continue-on-error: true
        run: npm audit --audit-level=high

  infra:
    # Chantier 0.2's "CI = arbitre unique" for the infra side: terraform
    # fmt + validate on infra/, and proof that the repo-root Dockerfile
    # compiles. Everything in this job is BLOCKING — no continue-on-error.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          # Pinned patch version: CI should not drift when a new
          # terraform release lands. ~1.7 matches the README prerequisite.
          terraform_version: "1.7.5"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive infra/

      - name: Terraform init (no backend)
        # -backend=false: no remote state exists; init only installs the
        # providers `validate` needs.
        run: terraform -chdir=infra init -backend=false

      - name: Terraform validate
        run: terraform -chdir=infra validate

      - name: Dockerfile lint (BuildKit check)
        # --check builds through BuildKit's linter and fails on check
        # violations; ubuntu-latest runners use BuildKit by default.
        run: docker build --check .

      - name: Docker build (no push)
        # The point is that the Dockerfile compiles end-to-end; the image
        # is tagged locally and discarded, never pushed.
        run: docker build -t constat-api-ci .
