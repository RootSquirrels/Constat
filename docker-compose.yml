# Async collection (chantier 1.1) — local dev stays INLINE.
#
# CONSTAT_COLLECT_MODE selects how POST /collect/aws executes:
#   - "inline" (default): the API scans synchronously in-process and
#     returns 200. This is the mode to use locally — no queue needed.
#   - "sqs": the API enqueues WorkItems (account x region) and returns
#     202 + job_id; a worker consumes them. This mode runs against the
#     deployed staging environment only (see infra/sqs.tf).
#
# There is deliberately NO LocalStack service here: a local SQS emulator
# is out of V1 scope (AGENTS.md — V1 is a Fargate task + cron + one SQS
# queue in the pilot account). Test the sqs path against staging, not
# against an emulator whose redrive/visibility semantics we would have
# to re-verify anyway.
#
# To run the API locally in inline mode (the default), just:
#   uv run python -m constat_api
# and optionally export CONSTAT_COLLECT_MODE=inline (it is the default).

services:
  postgres:
    image: postgres:16-alpine
    container_name: constat-postgres
    environment:
      POSTGRES_USER: constat
      POSTGRES_PASSWORD: constat
      POSTGRES_DB: constat
    ports:
      - "5432:5432"
    volumes:
      - constat-pg-data:/var/lib/postgresql/data
    # No docker-entrypoint-initdb.d mount: schema is managed by Alembic
    # (db/alembic/, see ADR-17). After `docker compose up -d`, run
    # `uv run alembic -c db/alembic.ini upgrade head` to create the
    # schema. The old pattern (mounting db/migrations/*.sql into the
    # init dir) no longer applies — those files are archived.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U constat -d constat"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: constat-minio
    environment:
      MINIO_ROOT_USER: constat
      MINIO_ROOT_PASSWORD: constat-secret
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - constat-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  constat-pg-data:
  constat-minio-data:
